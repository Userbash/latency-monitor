name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Validate workflow files
        run: npm run workflow:check

      - name: Install Playwright browser
        run: npm run test:e2e:install

      - name: Run prebuild quality gates
        run: npm run test:prebuild

      - name: Run E2E tests
        run: npm run test:e2e:ci

      - name: Run postbuild checks
        run: npm run build && npm run test:postbuild

      - name: Collect debug report on failure
        if: failure()
        run: npm run debug:report:ci || true

      - name: Upload debug report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-debug-report
          path: reports/debug/**
          if-no-files-found: ignore

  rust-backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-backend

      - name: Run Rust backend tests
        run: npm run test:backend

      - name: Collect debug report on failure
        if: failure()
        run: npm run debug:report:ci || true

      - name: Upload debug report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-backend-debug-report
          path: reports/debug/**
          if-no-files-found: ignore

  release-builds:
    name: release-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [quality, rust-backend-tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: appimage
            command: npm run release:ci:appimage
            artifactName: appimage-artifacts
            artifactPath: dist/*.AppImage
          - os: windows-latest
            target: windows
            command: npm run release:ci:win
            artifactName: windows-artifacts
            artifactPath: dist/*.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build release artifacts
        run: ${{ matrix.command }}

      - name: Run AppImage postbuild checks
        if: matrix.target == 'appimage'
        run: npm run test:postbuild:appimage

      - name: Run Windows postbuild checks
        if: matrix.target == 'windows'
        run: npm run test:postbuild:win

      - name: Collect debug report on failure
        if: failure()
        run: npm run debug:report:ci || true

      - name: Upload release artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: ${{ matrix.artifactPath }}
          if-no-files-found: error

      - name: Upload debug report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}-debug-report
          path: reports/debug/**
          if-no-files-found: ignore

      - name: Upload postbuild report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}-postbuild-report
          path: reports/postbuild/**
          if-no-files-found: ignore
