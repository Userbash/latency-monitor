name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - name: Install Node dependencies
        run: npm install
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Run frontend unit tests (Jest)
        run: npm run test:unit
      - name: Run backend unit tests (Pytest)
        run: pytest python/
      - name: Generate coverage reports
        run: npm run test -- --coverage
      - name: Pytest coverage report
        run: pytest --cov=python --cov-report=xml
      - name: Upload coverage reports
        uses: actions/upload-artifact@v3
        with:
          name: coverage-reports
          path: |
            coverage/
            coverage.xml

  lint-debug:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install Node dependencies
        run: npm install
      - name: Code quality and lint (ESLint)
        run: npm run lint
      - name: Debug and error log collection
        run: |
          grep -i 'error\|warning' dist-electron/main.js || true
          grep -i 'error\|warning' dist-electron/network.js || true

  build-release-linux:
      runs-on: ubuntu-latest
      needs: [unit-tests, lint-debug]
      steps:
        - name: Checkout code
          uses: actions/checkout@v3
        - name: Set up Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
        - name: Set up Python
          uses: actions/setup-python@v4
          with:
            python-version: 3.12
        - name: Install Node dependencies
          run: npm install
        - name: Install Python dependencies
          run: pip install -r requirements.txt
        - name: Build frontend
          run: npm run build:web
        - name: Build Electron app
          run: npm run build
        - name: Build Docker image
          run: docker build -t esports-network-monitor .
        - name: Package AppImage (Linux)
          run: |
            chmod +x scripts/release-appimage.sh
            ./scripts/release-appimage.sh
        - name: Upload Linux artifacts
          uses: actions/upload-artifact@v3
          with:
            name: linux-artifacts
            path: |
              dist-electron/*.AppImage
        - name: Publish GitHub Release (Linux)
          uses: softprops/action-gh-release@v1
          with:
            files: dist-electron/*.AppImage
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        - name: Generate changelog
          run: npx changelogithub
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        - name: Notify on failure
          if: failure()
          uses: actions/github-script@v6
          with:
            script: |
              github.issues.createComment({
                issue_number: context.issue.number,
                body: 'Linux build/release failed. Please check logs and coverage reports.'
              })

  build-release-windows:
      runs-on: windows-latest
      needs: [unit-tests, lint-debug]
      steps:
        - name: Checkout code
          uses: actions/checkout@v3
        - name: Set up Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
        - name: Set up Python
          uses: actions/setup-python@v4
          with:
            python-version: 3.12
        - name: Install Node dependencies
          run: npm install
        - name: Install Python dependencies
          run: pip install -r requirements.txt
        - name: Build frontend
          run: npm run build:web
        - name: Build Electron app
          run: npm run build
        - name: Package Windows EXE
          run: |
            powershell scripts/release-windows.ps1
        - name: Upload Windows artifacts
          uses: actions/upload-artifact@v3
          with:
            name: windows-artifacts
            path: |
              dist-electron/*.exe
        - name: Publish GitHub Release (Windows)
          uses: softprops/action-gh-release@v1
          with:
            files: dist-electron/*.exe
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        - name: Generate changelog
          run: npx changelogithub
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        - name: Notify on failure
          if: failure()
          uses: actions/github-script@v6
          with:
            script: |
              github.issues.createComment({
                issue_number: context.issue.number,
                body: 'Windows build/release failed. Please check logs and coverage reports.'
              })
